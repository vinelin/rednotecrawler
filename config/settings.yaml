# ----- 搜索配置 -----
# 搜索关键词列表，爬虫会依次搜索每个关键词
keywords:
  - "亚文化"
  - "Y2K"

# 目标领域名称（用于评估时的领域匹配）
target_domain: "亚文化"

# 每次采集的达人数量上限
limit: 50

# 每位达人采集的最近笔记数量
notes_per_user: 20

# ----- 反爬配置 -----
# 请求间隔范围（秒），随机取值，无代理需偏保守
delay_min: 5
delay_max: 12

# 检测到风控时的暂停时长（秒）
block_pause: 60

# 最大重试次数
max_retries: 3

# ----- 浏览器配置 -----
# 是否使用无头模式（true: 不显示浏览器窗口, false: 显示）
headless: true

# 浏览器视口宽度
viewport_width: 1920

# 浏览器视口高度
viewport_height: 1080

# ----- 输出配置 -----
# 数据库文件路径
db_path: "data/db/xiaohongshu.db"

# 图片保存目录
images_dir: "data/images"

# Excel 导出目录
export_dir: "data/exports"
